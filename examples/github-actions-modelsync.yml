name: ModelSync Migration Preview

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Database/Scripts/**"

jobs:
  validate-and-preview:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install ModelSync CLI
        run: dotnet tool install --global UmbrellaFrame.ModelSync.Cli --version 1.3.0

      - name: Validate migration scripts
        run: modelsync validate --scripts ./Database/Scripts

      - name: Dry-run migration plan
        run: |
          modelsync run \
            --provider sqlite \
            --connection "Data Source=modelsync-preview.db" \
            --scripts ./Database/Scripts \
            --dry-run

      - name: Apply to disposable preview database
        run: |
          modelsync run \
            --provider sqlite \
            --connection "Data Source=modelsync-preview.db" \
            --scripts ./Database/Scripts \
            --report-md ./artifacts/modelsync-report.md \
            --report-json ./artifacts/modelsync-report.json

      - uses: actions/upload-artifact@v4
        with:
          name: modelsync-migration-report
          path: artifacts/

