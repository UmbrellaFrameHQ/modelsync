services:
  modelsync-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: modelsync-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ModelSync_Pass123"
    ports:
      - "14333:1433"

  modelsync-mysql:
    image: mysql:8.4
    container_name: modelsync-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "ModelSync_Pass123"
      MYSQL_DATABASE: "modelsync_sp"
    ports:
      - "3307:3306"

  modelsync-postgres:
    image: postgres:16
    container_name: modelsync-postgres
    environment:
      POSTGRES_PASSWORD: "ModelSync_Pass123"
      POSTGRES_DB: "modelsync_sp"
    ports:
      - "5433:5432"

  modelsync-oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: modelsync-oracle
    environment:
      ORACLE_PASSWORD: "ModelSync_Pass123"
      APP_USER: "MODELSYNC_TEST"
      APP_USER_PASSWORD: "ModelSync_Pass123"
    ports:
      - "11521:1521"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 60s
