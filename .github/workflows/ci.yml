name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: |
          dotnet build UmbrellaFrame.ModelSync.Core/UmbrellaFrame.ModelSync.Core.csproj --no-restore --configuration Release
          dotnet build UmbrellaFrame.ModelSync.MySql/UmbrellaFrame.ModelSync.MySql.csproj --no-restore --configuration Release
          dotnet build UmbrellaFrame.ModelSync.SqlServer/UmbrellaFrame.ModelSync.SqlServer.csproj --no-restore --configuration Release
          dotnet build UmbrellaFrame.ModelSync.PostgreSQL/UmbrellaFrame.ModelSync.PostgreSQL.csproj --no-restore --configuration Release
          dotnet build UmbrellaFrame.ModelSync.SQLite/UmbrellaFrame.ModelSync.SQLite.csproj --no-restore --configuration Release
          dotnet build UmbrellaFrame.ModelSync.Analyzers/UmbrellaFrame.ModelSync.Core.Analyzers.csproj --no-restore --configuration Release
          dotnet build UmbrellaFrame.ModelSync.NotesExtension/UmbrellaFrame.ModelSync.NotesExtension.csproj --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test UmbrellaFrame.ModelSync.CoreTest/UmbrellaFrame.ModelSync.CoreTest.csproj --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test UmbrellaFrame.ModelSync.MySqlTest/UmbrellaFrame.ModelSync.MySqlTest.csproj --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test UmbrellaFrame.ModelSync.SqlServerTest/UmbrellaFrame.ModelSync.SqlServerTest.csproj --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test UmbrellaFrame.ModelSync.PostgreSQLTest/UmbrellaFrame.ModelSync.PostgreSQLTest.csproj --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test UmbrellaFrame.ModelSync.SQLiteTest/UmbrellaFrame.ModelSync.SQLiteTest.csproj --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test UmbrellaFrame.ModelSync.NotesExtensionTest/UmbrellaFrame.ModelSync.NotesExtensionTest.csproj --no-build --configuration Release --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false

  build-vsix:
    name: Build Notes VSIX
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore UmbrellaFrame.ModelSync.NotesExtension.Vsix/UmbrellaFrame.ModelSync.NotesExtension.Vsix.csproj

      - name: Build
        run: dotnet build UmbrellaFrame.ModelSync.NotesExtension.Vsix/UmbrellaFrame.ModelSync.NotesExtension.Vsix.csproj --no-restore --configuration Release

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: modelsync-notes-vsix
          path: UmbrellaFrame.ModelSync.NotesExtension.Vsix/bin/Release/net472/*.vsix

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: |
          dotnet pack UmbrellaFrame.ModelSync.Core/UmbrellaFrame.ModelSync.Core.csproj --configuration Release --no-restore --output ./nupkg
          dotnet pack UmbrellaFrame.ModelSync.MySql/UmbrellaFrame.ModelSync.MySql.csproj --configuration Release --no-restore --output ./nupkg
          dotnet pack UmbrellaFrame.ModelSync.SqlServer/UmbrellaFrame.ModelSync.SqlServer.csproj --configuration Release --no-restore --output ./nupkg
          dotnet pack UmbrellaFrame.ModelSync.PostgreSQL/UmbrellaFrame.ModelSync.PostgreSQL.csproj --configuration Release --no-restore --output ./nupkg
          dotnet pack UmbrellaFrame.ModelSync.SQLite/UmbrellaFrame.ModelSync.SQLite.csproj --configuration Release --no-restore --output ./nupkg
          dotnet pack UmbrellaFrame.ModelSync.Analyzers/UmbrellaFrame.ModelSync.Core.Analyzers.csproj --configuration Release --no-restore --output ./nupkg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkg/*.nupkg

  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
