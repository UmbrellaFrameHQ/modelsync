name: CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore ModelSync.sln

      - name: Build
        run: dotnet build ModelSync.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ModelSync.sln --configuration Release --no-build --filter "Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Verify repository
        run: dotnet run --project tools/UmbrellaFrame.ModelSync.RepositoryChecks -- verify-all

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          fail_ci_if_error: false

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore ModelSync.sln

      - name: Build
        run: dotnet build ModelSync.sln --no-restore --configuration Release

      - name: Pack
        run: dotnet pack ModelSync.sln --configuration Release --no-build --output ./nupkg

      - name: Package smoke test
        run: dotnet run --project tools/UmbrellaFrame.ModelSync.RepositoryChecks -- verify-package-smoke nupkg 1.2.2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkg/*.nupkg
