name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  database-integration:
    name: Database Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        # Pin database images for deterministic release gates and to prevent unexpected provider patch drift.
        image: mysql:8.4.10
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: appdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mariadb:
        # Pin database images for deterministic release gates and to prevent unexpected provider patch drift.
        image: mariadb:11.8.8
        env:
          MARIADB_ROOT_PASSWORD: rootpass
          MARIADB_DATABASE: appdb
        ports:
          - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppass
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d appdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong!Passw0rd
        ports:
          - 1433:1433

    env:
      MODELSYNC_RUN_MYSQL_INTEGRATION: 1
      MODELSYNC_RUN_MARIADB_INTEGRATION: 1
      MODELSYNC_RUN_POSTGRES_INTEGRATION: 1
      MODELSYNC_RUN_SQLSERVER_INTEGRATION: 1
      MODELSYNC_RUN_SP_INTEGRATION: 1
      MODELSYNC_MYSQL_CONNECTION_STRING: Server=127.0.0.1;Port=3306;Database=appdb;User ID=root;Password=rootpass;
      MODELSYNC_MARIADB_CONNECTION_STRING: Server=127.0.0.1;Port=3307;Database=appdb;User ID=root;Password=rootpass;
      MODELSYNC_MYSQL_SP_CONNECTION_STRING: Server=127.0.0.1;Port=3306;Database=appdb;User ID=root;Password=rootpass;
      MODELSYNC_POSTGRES_CONNECTION_STRING: Host=127.0.0.1;Port=5432;Database=appdb;Username=appuser;Password=apppass;
      MODELSYNC_POSTGRES_SP_CONNECTION_STRING: Host=127.0.0.1;Port=5432;Database=appdb;Username=appuser;Password=apppass;
      MODELSYNC_SQLSERVER_CONNECTION_STRING: Server=127.0.0.1,1433;Database=appdb;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=False;TrustServerCertificate=True;
      MODELSYNC_SQLSERVER_SP_CONNECTION_STRING: Server=127.0.0.1,1433;Database=appdb;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=False;TrustServerCertificate=True;

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: |
          dotnet restore UmbrellaFrame.ModelSync.MySqlTest/UmbrellaFrame.ModelSync.MySqlTest.csproj
          dotnet restore UmbrellaFrame.ModelSync.PostgreSQLTest/UmbrellaFrame.ModelSync.PostgreSQLTest.csproj
          dotnet restore UmbrellaFrame.ModelSync.SqlServerTest/UmbrellaFrame.ModelSync.SqlServerTest.csproj
          dotnet restore UmbrellaFrame.ModelSync.SQLiteTest/UmbrellaFrame.ModelSync.SQLiteTest.csproj

      - name: Build
        run: |
          dotnet build UmbrellaFrame.ModelSync.MySqlTest/UmbrellaFrame.ModelSync.MySqlTest.csproj --configuration Release --no-restore
          dotnet build UmbrellaFrame.ModelSync.PostgreSQLTest/UmbrellaFrame.ModelSync.PostgreSQLTest.csproj --configuration Release --no-restore
          dotnet build UmbrellaFrame.ModelSync.SqlServerTest/UmbrellaFrame.ModelSync.SqlServerTest.csproj --configuration Release --no-restore
          dotnet build UmbrellaFrame.ModelSync.SQLiteTest/UmbrellaFrame.ModelSync.SQLiteTest.csproj --configuration Release --no-restore

      - name: Database preflight
        run: |
          mysql_db=$(docker run --rm --network host mysql:8.4.10 mysql -h127.0.0.1 -P3306 -uroot -prootpass -N -e "SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME = 'appdb';")
          if [ "$mysql_db" != "appdb" ]; then
            echo "MODELSYNC_INTEGRATION_DATABASE_PREFLIGHT_FAILED: MySQL target database 'appdb' is not available."
            exit 1
          fi

          mariadb_db=$(docker run --rm --network host mariadb:11.8.8 mariadb -h127.0.0.1 -P3307 -uroot -prootpass -N -e "SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME = 'appdb';")
          if [ "$mariadb_db" != "appdb" ]; then
            echo "MODELSYNC_INTEGRATION_DATABASE_PREFLIGHT_FAILED: MariaDB target database 'appdb' is not available."
            exit 1
          fi

      - name: Run integration tests
        run: |
          mkdir -p TestResults
          dotnet test UmbrellaFrame.ModelSync.MySqlTest/UmbrellaFrame.ModelSync.MySqlTest.csproj --configuration Release --no-build --filter "Category=Integration" --logger "trx;LogFileName=mysql.trx" --results-directory TestResults
          dotnet test UmbrellaFrame.ModelSync.PostgreSQLTest/UmbrellaFrame.ModelSync.PostgreSQLTest.csproj --configuration Release --no-build --filter "Category=Integration" --logger "trx;LogFileName=postgresql.trx" --results-directory TestResults
          dotnet test UmbrellaFrame.ModelSync.SqlServerTest/UmbrellaFrame.ModelSync.SqlServerTest.csproj --configuration Release --no-build --filter "Category=Integration" --logger "trx;LogFileName=sqlserver.trx" --results-directory TestResults
          dotnet test UmbrellaFrame.ModelSync.SQLiteTest/UmbrellaFrame.ModelSync.SQLiteTest.csproj --configuration Release --no-build --filter "Category=Integration" --logger "trx;LogFileName=sqlite.trx" --results-directory TestResults

          if grep -R 'outcome="Failed"' TestResults/*.trx; then
            echo "MODELSYNC_INTEGRATION_RESULT_GATE_FAILED: failed integration tests were found."
            exit 1
          fi

          if grep -R 'outcome="NotExecuted"' TestResults/*.trx; then
            echo "MODELSYNC_INTEGRATION_RESULT_GATE_FAILED: skipped integration tests were found."
            exit 1
          fi

          grep -R "LegacyUpgradeFirstRun" TestResults/mysql.trx
          grep -R "LegacyUpgradeSecondRun" TestResults/mysql.trx
          grep -R "SyncRegisteredAsync_CreatesProcedure_ThenDetectsNoChange" TestResults/mysql.trx
