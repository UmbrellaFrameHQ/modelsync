name: Recover Partial NuGet Publication

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Immutable release tag to recover, for example v1.2.2
        required: true
        type: string
      version:
        description: Package version to recover, for example 1.2.2 or 1.4.0-rc.1
        required: true
        type: string
      expected_commit:
        description: Full 40-character commit SHA that the release tag must resolve to
        required: true
        type: string
      source_run_id:
        description: Failed publish workflow run ID that produced the canonical artifact
        required: true
        type: string
      artifact_name:
        description: Canonical publication artifact name
        required: true
        type: string
      expected_artifact_digest:
        description: Expected artifact digest, for example sha256:<hex>
        required: true
        type: string
      confirmation:
        description: Type RESUME-PUBLISH-${version} to confirm recovery
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: nuget-production
  cancel-in-progress: false

jobs:
  recover:
    name: Recover missing NuGet packages
    runs-on: ubuntu-latest
    environment: nuget-production

    steps:
      - name: Validate dispatch input
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          release_tag="${{ inputs.release_tag }}"
          expected_commit="${{ inputs.expected_commit }}"
          source_run_id="${{ inputs.source_run_id }}"
          expected_artifact_digest="${{ inputs.expected_artifact_digest }}"
          confirmation="${{ inputs.confirmation }}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "MODELSYNC_RECOVERY_INPUT_INVALID: version must be SemVer major.minor.patch with an optional prerelease suffix."
            exit 1
          fi

          if [[ "$release_tag" != "v$version" ]]; then
            echo "MODELSYNC_RECOVERY_INPUT_INVALID: release_tag must equal v${version}."
            exit 1
          fi

          if [[ "$confirmation" != "RESUME-PUBLISH-$version" ]]; then
            echo "MODELSYNC_RECOVERY_INPUT_INVALID: confirmation must equal RESUME-PUBLISH-${version}."
            exit 1
          fi

          if [[ ! "$expected_commit" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "MODELSYNC_RECOVERY_INPUT_INVALID: expected_commit must be a full 40-character SHA."
            exit 1
          fi

          if [[ ! "$source_run_id" =~ ^[0-9]+$ ]]; then
            echo "MODELSYNC_RECOVERY_INPUT_INVALID: source_run_id must be numeric."
            exit 1
          fi

          if [[ ! "$expected_artifact_digest" =~ ^sha256:[0-9a-fA-F]{64}$ ]]; then
            echo "MODELSYNC_RECOVERY_INPUT_INVALID: expected_artifact_digest must be sha256:<64 hex>."
            exit 1
          fi

      - name: Checkout recovery workflow source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate immutable release identity
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ inputs.release_tag }}"
          expected_commit="${{ inputs.expected_commit }}"

          git fetch --tags origin "$release_tag"

          tag_target="$(git rev-list -n 1 "$release_tag")"
          tag_type="$(git cat-file -t "$release_tag")"
          remote_target="$(git ls-remote origin "refs/tags/${release_tag}^{}" | awk '{print $1}')"

          if [[ "$tag_type" != "tag" ]]; then
            echo "MODELSYNC_RECOVERY_TAG_INVALID: release tag must be annotated."
            exit 1
          fi

          if [[ "$tag_target" != "$expected_commit" || "$remote_target" != "$expected_commit" ]]; then
            echo "MODELSYNC_RECOVERY_TAG_INVALID: release tag target mismatch."
            exit 1
          fi

          for workflow in "CI" "Integration Tests"; do
            run_json="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --branch "$release_tag" --commit "$expected_commit" --limit 10 --json conclusion,headSha,status,databaseId --jq 'map(select(.headSha == "'"$expected_commit"'")) | first')"
            if [[ -z "$run_json" || "$run_json" == "null" ]]; then
              echo "MODELSYNC_RECOVERY_REQUIRED_CI_MISSING: ${workflow} run was not found for ${expected_commit}."
              exit 1
            fi

            conclusion="$(printf '%s' "$run_json" | jq -r '.conclusion')"
            status="$(printf '%s' "$run_json" | jq -r '.status')"
            run_id="$(printf '%s' "$run_json" | jq -r '.databaseId')"

            if [[ "$status" != "completed" || "$conclusion" != "success" ]]; then
              echo "MODELSYNC_RECOVERY_REQUIRED_CI_NOT_SUCCESS: ${workflow} run ${run_id} is ${status}/${conclusion}."
              exit 1
            fi
          done

      - name: Validate source run and artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          run_id="${{ inputs.source_run_id }}"
          artifact_name="${{ inputs.artifact_name }}"
          expected_digest="${{ inputs.expected_artifact_digest }}"

          run_json="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json workflowName,conclusion,status,databaseId)"
          workflow_name="$(printf '%s' "$run_json" | jq -r '.workflowName')"
          conclusion="$(printf '%s' "$run_json" | jq -r '.conclusion')"
          status="$(printf '%s' "$run_json" | jq -r '.status')"

          if [[ "$workflow_name" != "Publish NuGet" || "$status" != "completed" || "$conclusion" != "failure" ]]; then
            echo "MODELSYNC_RECOVERY_SOURCE_RUN_INVALID: source run is not the expected failed Publish NuGet run."
            exit 1
          fi

          artifact_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" --paginate --jq '.artifacts[] | select(.name == "'"$artifact_name"'")')"
          if [[ -z "$artifact_json" ]]; then
            echo "MODELSYNC_RECOVERY_ARTIFACT_MISSING: canonical artifact was not found."
            exit 1
          fi

          artifact_id="$(printf '%s' "$artifact_json" | jq -r '.id')"
          expired="$(printf '%s' "$artifact_json" | jq -r '.expired')"
          digest="$(printf '%s' "$artifact_json" | jq -r '.digest')"

          if [[ "$expired" != "false" ]]; then
            echo "MODELSYNC_RECOVERY_ARTIFACT_INVALID: canonical artifact is expired."
            exit 1
          fi

          if [[ "$digest" != "$expected_digest" ]]; then
            echo "MODELSYNC_RECOVERY_ARTIFACT_INVALID: digest mismatch."
            exit 1
          fi

      - name: Download canonical publication artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/recovery
          mkdir -p artifacts/recovery
          gh run download "${{ inputs.source_run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --name "${{ inputs.artifact_name }}" \
            --dir artifacts/recovery

      - name: Validate canonical artifact contents
        shell: bash
        run: |
          set -euo pipefail

          cd artifacts/recovery
          sha256sum --check SHA256SUMS.txt

          version="$(jq -r '.version' evidence.json)"
          release_tag="$(jq -r '.releaseTag' evidence.json)"
          expected_commit="$(jq -r '.expectedCommit' evidence.json)"

          if [[ "$version" != "${{ inputs.version }}" || "$release_tag" != "${{ inputs.release_tag }}" || "$expected_commit" != "${{ inputs.expected_commit }}" ]]; then
            echo "MODELSYNC_RECOVERY_ARTIFACT_INVALID: evidence metadata mismatch."
            exit 1
          fi

          expected=(
            "UmbrellaFrame.ModelSync.Core.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.SqlServer.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.MySql.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.PostgreSQL.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.SQLite.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.Analyzers.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.Cli.${{ inputs.version }}.nupkg"
            "UmbrellaFrame.ModelSync.Oracle.${{ inputs.version }}.nupkg"
          )

          mapfile -t actual < <(find . -maxdepth 1 -type f -name "*.nupkg" -printf '%f\n' | sort)
          mapfile -t wanted < <(printf '%s\n' "${expected[@]}" | sort)

          if [[ "${#actual[@]}" -ne 8 ]]; then
            echo "MODELSYNC_RECOVERY_ARTIFACT_INVALID: expected exactly eight nupkg files."
            printf '%s\n' "${actual[@]}"
            exit 1
          fi

          if ! diff -u <(printf '%s\n' "${wanted[@]}") <(printf '%s\n' "${actual[@]}"); then
            echo "MODELSYNC_RECOVERY_ARTIFACT_INVALID: package IDs or versions do not match the allowlist."
            exit 1
          fi

          if find . -maxdepth 1 -type f \( -name "*local*" -o -name "*1.2.1*" \) | grep .; then
            echo "MODELSYNC_RECOVERY_ARTIFACT_INVALID: local or forbidden previous-version package found."
            exit 1
          fi

      - name: Verify NuGet production secret
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "MODELSYNC_NUGET_PRODUCTION_SECRET_MISSING"
            exit 1
          fi

      - name: Validate expected partial NuGet state
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"

          exists() {
            local package="$1"
            local id
            id="$(printf '%s' "$package" | tr '[:upper:]' '[:lower:]')"
            curl --fail --silent --show-error "https://api.nuget.org/v3-flatcontainer/${id}/index.json" \
              | jq -e --arg version "$version" '.versions | index($version)' >/dev/null
          }

          existing=()
          missing=()
          for package in \
            "UmbrellaFrame.ModelSync.Core" \
            "UmbrellaFrame.ModelSync.SqlServer" \
            "UmbrellaFrame.ModelSync.MySql" \
            "UmbrellaFrame.ModelSync.PostgreSQL" \
            "UmbrellaFrame.ModelSync.SQLite" \
            "UmbrellaFrame.ModelSync.Analyzers" \
            "UmbrellaFrame.ModelSync.Cli" \
            "UmbrellaFrame.ModelSync.Oracle"; do
            if exists "$package"; then
              existing+=("$package")
            else
              missing+=("$package")
            fi
          done

          if [[ "${#existing[@]}" -eq 0 || "${#missing[@]}" -eq 0 ]]; then
            echo "MODELSYNC_RECOVERY_PARTIAL_STATE_INVALID: expected both published and missing packages."
            exit 1
          fi

          printf 'Published: %s\n' "${existing[*]}"
          printf 'Missing: %s\n' "${missing[*]}"
          echo "MODELSYNC_PARTIAL_NUGET_PUBLICATION_CONFIRMED"

      - name: Publish missing packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"

          package_exists() {
            local package="$1"
            local id
            id="$(printf '%s' "$package" | tr '[:upper:]' '[:lower:]')"
            curl --fail --silent "https://api.nuget.org/v3-flatcontainer/${id}/index.json" \
              | jq -e --arg version "$version" '.versions | index($version)' >/dev/null
          }

          wait_for_version() {
            local package="$1"
            for attempt in {1..180}; do
              if package_exists "$package"; then
                return 0
              fi
              sleep 10
            done
            echo "MODELSYNC_RECOVERY_NUGET_VISIBILITY_TIMEOUT: ${package} ${version}"
            return 1
          }

          publish_missing() {
            local package="$1"
            local path="artifacts/recovery/${package}.${version}.nupkg"

            if package_exists "$package"; then
              echo "MODELSYNC_RECOVERY_SKIP_EXISTING: ${package} ${version}"
              return 0
            fi

            dotnet nuget push "$path" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json

            wait_for_version "$package"
          }

          publish_missing "UmbrellaFrame.ModelSync.Core"
          publish_missing "UmbrellaFrame.ModelSync.SqlServer"
          publish_missing "UmbrellaFrame.ModelSync.MySql"
          publish_missing "UmbrellaFrame.ModelSync.PostgreSQL"
          publish_missing "UmbrellaFrame.ModelSync.SQLite"
          publish_missing "UmbrellaFrame.ModelSync.Analyzers"
          publish_missing "UmbrellaFrame.ModelSync.Cli"
          publish_missing "UmbrellaFrame.ModelSync.Oracle"

      - name: Verify complete NuGet publication
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          for package in \
            "UmbrellaFrame.ModelSync.Core" \
            "UmbrellaFrame.ModelSync.SqlServer" \
            "UmbrellaFrame.ModelSync.MySql" \
            "UmbrellaFrame.ModelSync.PostgreSQL" \
            "UmbrellaFrame.ModelSync.SQLite" \
            "UmbrellaFrame.ModelSync.Analyzers" \
            "UmbrellaFrame.ModelSync.Cli" \
            "UmbrellaFrame.ModelSync.Oracle"; do
            id="$(printf '%s' "$package" | tr '[:upper:]' '[:lower:]')"
            curl --fail --silent "https://api.nuget.org/v3-flatcontainer/${id}/index.json" \
              | jq -e --arg version "$version" '.versions | index($version)' >/dev/null
          done

          echo "MODELSYNC_CANONICAL_ARTIFACT_RECOVERY_FULL_PASS"
